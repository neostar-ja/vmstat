server {
    listen 443 ssl;
    server_name 10.251.150.222:3345;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ==========================================
    # HTTP Security Headers
    # ==========================================
    # ป้องกัน Clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # ป้องกัน MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # บังคับ HTTPS ทุกครั้ง (HSTS) – 1 ปี
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ควบคุม Referrer ไม่ส่ง origin ออกนอกเว็บ
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ป้องกัน XSS และ resource injection ผ่าน CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;
    # ปิด Permission ที่ไม่จำเป็น
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # ซ่อน nginx version
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Prevent absolute redirects that drop the external port
    absolute_redirect off;

    # Handle React routing
    location /vmstat/ {
        alias /usr/share/nginx/html/vmstat/;
        try_files $uri $uri/ /vmstat/index.html;
    }

    # Proxy API requests to backend
    location /vmstat/api/ {
        proxy_pass http://vmstat-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'healthy';
    }
}
